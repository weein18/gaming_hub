<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="Elitehub, CS2 predictions, CS:GO rankings, match predictions, eSports hub, csgo predictions, gamehub">
    <meta name="description" content="Elitehub: The ultimate destination for CS2 match predictions, rankings, and eSports stats. Join now to climb to Global Elite!">

    <title>{% block title %}Elite Gaming Hub{% endblock %}</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <a href="{{ url_for('index') }}" style="text-decoration: none; color: inherit;">
                ELITE<span>HUB</span>
            </a>
        </div>
        <div class="nav-links">
            {% if current_user.is_authenticated %}
                <a href="{{ url_for('dashboard') }}">Dashboard</a>
            {% else %}
                <a href="{{ url_for('index') }}">Homepage</a>
            {% endif %}
            
            <a href="{{ url_for('matches') }}">Matches</a>

            {% if current_user.is_authenticated %}
                <div class="dropdown">
                    <button class="dropbtn">
                        <div class="user-avatar-circle" style="padding: 0; overflow: hidden; border: 1px solid var(--primary);">
                            {% if current_user.avatar %}
                                <img src="{{ url_for('static', filename='uploads/' + current_user.avatar) }}" 
                                    style="width: 100%; height: 100%; object-fit: cover;">
                            {% else %}
                                {{ current_user.username[0].upper() }}
                            {% endif %}
                        </div>
                        {{ current_user.username }}
                    </button>
                    <div class="dropdown-content">
                        <a href="{{ url_for('profile', username=current_user.username) }}">My Profile</a>
                        <a href="{{ url_for('settings', username=current_user.username) }}">Settings</a>
                        <div class="dropdown-divider"></div>
                        <a href="{{ url_for('logout') }}" class="logout-link">Logout</a>
                    </div>
                </div>
            {% else %}
                <a href="{{ url_for('login') }}">Login</a>
                <a href="{{ url_for('register') }}" class="register-btn">Registration</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
