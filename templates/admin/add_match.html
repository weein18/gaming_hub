{% extends "base.html" %}
{% block content %}
<div class="main-container" style="display: flex; flex-direction: column; align-items: center; padding-top: 140px;">
    <div class="match-card" style="width: 100%; max-width: 600px; padding: 50px;">
        
        <div style="margin-bottom: 30px; border-left: 4px solid var(--primary); padding-left: 20px;">
            <h2 style="text-transform: uppercase; letter-spacing: -1px;">Add New <span class="highlight">Match</span></h2>
            <p style="font-size: 0.7rem; color: #555; font-weight: 800; letter-spacing: 2px;">DATABASE INPUT TERMINAL</p>
        </div>

            <form action="{{ url_for('admin_add_match', key='ТВОЙ_СЕКРЕТНЫЙ_КЛЮЧ') }}" method="POST"></form>
            <div>
                <label style="display: block; font-size: 0.6rem; color: var(--primary); font-weight: 900; margin-bottom: 8px;">TOURNAMENT NAME</label>
                <input type="text" name="tournament" placeholder="e.g. IEM RIO 2026" required
                    style="width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; padding: 12px; font-family: inherit;">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label style="display: block; font-size: 0.6rem; color: #888; font-weight: 900; margin-bottom: 8px;">TEAM 1</label>
                    <input type="text" name="team1" placeholder="NAVI" required
                        style="width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; padding: 12px; font-family: inherit;">
                </div>
                <div>
                    <label style="display: block; font-size: 0.6rem; color: #888; font-weight: 900; margin-bottom: 8px;">TEAM 2</label>
                    <input type="text" name="team2" placeholder="G2" required
                        style="width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; padding: 12px; font-family: inherit;">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label style="display: block; font-size: 0.6rem; color: #888; font-weight: 900; margin-bottom: 8px;">DATE</label>
                    <input type="text" name="date" placeholder="April 25" required
                        style="width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; padding: 12px; font-family: inherit;">
                </div>
                <div>
                    <label style="display: block; font-size: 0.6rem; color: #888; font-weight: 900; margin-bottom: 8px;">TIME (UTC)</label>
                    <input type="text" name="time" placeholder="18:00" required
                        style="width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; padding: 12px; font-family: inherit;">
                </div>
            </div>

            <button type="submit" class="liquid-btn" style="margin-top: 20px; cursor: pointer; border: none;">UPLOAD TO DATABASE</button>
        </form>
    </div>
</div>
{% endblock %}
