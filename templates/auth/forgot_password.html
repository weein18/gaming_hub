{% extends "base.html" %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="match-card" style="width: 100%; max-width: 400px; padding: 40px; text-align: center;">
        <h2 style="font-size: 2rem; margin-bottom: 10px;">RESET <span class="highlight">ACCESS</span></h2>
        <p style="color: #666; font-size: 0.8rem; margin-bottom: 30px; letter-spacing: 1px;">ENTER YOUR REGISTERED EMAIL</p>

        <form method="POST">
            <div style="margin-bottom: 20px; text-align: left;">
                <label style="font-size: 0.6rem; color: #444; font-weight: 800; letter-spacing: 2px;">EMAIL ADDRESS</label>
                <input type="email" name="email" required placeholder="name@example.com"
                       style="width: 100%; background: rgba(255,255,255,0.03); border: 1px solid #222; color: white; padding: 15px; border-radius: 8px; margin-top: 5px; outline: none;">
            </div>

            <button type="submit" class="liquid-btn" style="width: 100%; margin-top: 10px;">SEND RESET LINK</button>
        </form>

        <div style="margin-top: 30px;">
            <a href="{{ url_for('login') }}" style="color: #444; font-size: 0.7rem; text-decoration: none; font-weight: 800;">← BACK TO LOGIN</a>
        </div>
    </div>
</div>
{% endblock %}
